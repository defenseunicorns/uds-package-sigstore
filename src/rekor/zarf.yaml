kind: ZarfPackageConfig
metadata:
  name: rekor
  description: "An artifact signature and attestation transparency log"
  url: https://github.com/sigstore/helm-charts/tree/main/charts/rekor

components:
  - name: rekor
    required: true
    only:
      flavor: upstream
    import:
      path: common
    charts:
      - name: rekor
        valuesFiles:
          - ./values/upstream-values.yaml
    images:
      - docker.io/curlimages/curl:8.12.1
      - docker.io/valkey/valkey:8.0.2-alpine
      - gcr.io/projectsigstore/rekor-server:v1.3.9
      - ghcr.io/sigstore/scaffolding/createtree:v0.7.21

  - name: rekor
    required: true
    only:
      flavor: unicorn
    import:
      path: common
    charts:
      - name: rekor
        valuesFiles:
          - ./values/unicorn-values.yaml
    images:
      - docker.io/curlimages/curl:8.12.1
      - cgr.dev/du-uds-defenseunicorns/valkey-fips:8.0.2
      - cgr.dev/du-uds-defenseunicorns/rekor-server-fips:1.3.9
      - ghcr.io/sigstore/scaffolding/createtree:v0.7.21
